---
name: tervinos
description: "Linux, distilled to what actually matters. tervinOS strips away the clutter and perfects three things: browsing with Zen, writing in markdown, and gaming on Steam. Nothing more. Nothing slower."
base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  - type: rpm-ostree
    install:
      - ghostwriter
      - wmctrl
      - distrobox
    remove: []

  - type: default-flatpaks
    notify: true
    system:
      install:
        - app.zen_browser.zen          
        - com.valvesoftware.Steam      
        - com.github.tchx84.Flatseal   # permission manager (Privacy)
        - org.kde.filelight            # storage visualizer

  # Ship TervinOS files into the image (branding, Tervin Shell, configs)
  - type: files
    files:
      - source: system
        destination: /   # copies repo's files/system/* into the image

  - type: signing
  
